<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E74C3C" />
    <meta name="description" content="飘悠番茄 — 极简专注计时 PWA，番茄工作法 + 任务管理 + 365 日热力图，离线可用、零追踪、本地存储" />
    <meta name="keywords" content="番茄工作法,专注计时,Pomodoro,PWA,时间管理,番茄钟,离线可用,零追踪" />
    <meta name="author" content="fullsummerdream" />

    <!-- 部署前替换为真实域名（搜索引擎规范化 + 分享卡片去重） -->
    <link rel="canonical" href="https://floattomato.example.com/" />

    <!-- Open Graph（微信、Telegram、Facebook 等分享卡片） -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="飘悠番茄" />
    <meta property="og:title" content="飘悠番茄 — 极简专注计时 PWA" />
    <meta property="og:description" content="番茄工作法 + 任务管理 + 365 日热力图，离线可用、零追踪、本地存储" />
    <meta property="og:url" content="https://floattomato.example.com/" />
    <meta property="og:image" content="https://floattomato.example.com/pwa-512x512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="zh_CN" />

    <!-- Twitter Card（X / 部分客户端） -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="飘悠番茄 — 极简专注计时 PWA" />
    <meta name="twitter:description" content="番茄工作法 + 任务管理 + 365 日热力图，离线可用、零追踪" />
    <meta name="twitter:image" content="https://floattomato.example.com/pwa-512x512.png" />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>飘悠番茄 — 极简专注计时 PWA</title>

    <!-- JSON-LD WebApplication 结构化数据（Google 富结果） -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "飘悠番茄",
        "alternateName": "FloatTomato",
        "description": "极简专注计时 PWA — 番茄工作法 + 任务管理 + 365 日热力图，离线可用、零追踪、本地存储",
        "url": "https://floattomato.example.com/",
        "applicationCategory": "ProductivityApplication",
        "operatingSystem": "Web Browser",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "inLanguage": "zh-CN",
        "isAccessibleForFree": true
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
